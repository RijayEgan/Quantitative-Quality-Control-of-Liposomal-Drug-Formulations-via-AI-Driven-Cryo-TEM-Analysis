MODEL:
  WEIGHTS: "detectron2://ImageNetPretrained/MSRA/R-50.pkl"
  MASK_ON: True
  RESNETS:
    DEPTH: 50
DATASETS:
  TRAIN: ("liposome_student_train",)
  TEST: ("liposome_student_val",)
SOLVER:
  IMS_PER_BATCH: 4
  BASE_LR: 0.0001
  MAX_ITER: 8000
  STEPS: [5000, 7000]
  CHECKPOINT_PERIOD: 500
INPUT:
  MIN_SIZE_TRAIN: (800,)
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MAX_SIZE_TEST: 1333
TEST:
  EVAL_PERIOD: 500
OUTPUT_DIR: "./Phase_4/output"
