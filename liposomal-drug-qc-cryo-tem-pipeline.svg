<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
      .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
      .label-top { font-size: 11px; font-weight: 500; fill: #888780; letter-spacing: 0.08em; }
      .step-num  { font-size: 11px; font-weight: 500; fill: #888780; }
      @media (prefers-color-scheme: dark) {
        .th { fill: #e8e6df; }
        .ts { fill: #9c9a92; }
        .label-top { fill: #5f5e5a; }
        .step-num  { fill: #5f5e5a; }
      }
      .b1 { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
      .b2 { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
      .b3 { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
      .b4 { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
      .b5 { fill: #EAF3DE; stroke: #3B6D11; stroke-width: 0.5; }
      .t1 { fill: #085041; } .s1 { fill: #0F6E56; }
      .t2 { fill: #0C447C; } .s2 { fill: #185FA5; }
      .t3 { fill: #3C3489; } .s3 { fill: #534AB7; }
      .t4 { fill: #633806; } .s4 { fill: #854F0B; }
      .t5 { fill: #27500A; } .s5 { fill: #3B6D11; }
      @media (prefers-color-scheme: dark) {
        .b1 { fill: #085041; stroke: #5DCAA5; }
        .b2 { fill: #0C447C; stroke: #85B7EB; }
        .b3 { fill: #3C3489; stroke: #AFA9EC; }
        .b4 { fill: #633806; stroke: #EF9F27; }
        .b5 { fill: #27500A; stroke: #97C459; }
        .t1 { fill: #9FE1CB; } .s1 { fill: #5DCAA5; }
        .t2 { fill: #B5D4F4; } .s2 { fill: #85B7EB; }
        .t3 { fill: #CECBF6; } .s3 { fill: #AFA9EC; }
        .t4 { fill: #FAC775; } .s4 { fill: #EF9F27; }
        .t5 { fill: #C0DD97; } .s5 { fill: #97C459; }
      }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      @media (prefers-color-scheme: dark) { .arr { stroke: #5f5e5a; } }
      .dashed { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text class="label-top" x="340" y="28" text-anchor="middle">LIPOSOMAL DRUG QC VIA AI-DRIVEN CRYO-TEM — 5-STEP PIPELINE</text>

  <!-- Step 1 -->
  <text class="step-num" x="150" y="52" text-anchor="middle">01</text>
  <rect class="b1" x="40" y="58" width="220" height="64" rx="8"/>
  <text class="th t1" x="150" y="83" text-anchor="middle" dominant-baseline="central">Cryo-TEM image capture</text>
  <text class="ts s1" x="150" y="103" text-anchor="middle" dominant-baseline="central">Vitrified liposome samples imaged</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="90" x2="300" y2="90" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <text class="step-num" x="410" y="52" text-anchor="middle">02</text>
  <rect class="b2" x="300" y="58" width="240" height="64" rx="8"/>
  <text class="th t2" x="420" y="83" text-anchor="middle" dominant-baseline="central">AI-driven image preprocessing</text>
  <text class="ts s2" x="420" y="103" text-anchor="middle" dominant-baseline="central">Denoising, contrast enhancement</text>

  <!-- Arrow 2→3 down -->
  <line x1="420" y1="122" x2="420" y2="182" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <text class="step-num" x="410" y="196" text-anchor="middle">03</text>
  <rect class="b3" x="300" y="202" width="240" height="64" rx="8"/>
  <text class="th t3" x="420" y="227" text-anchor="middle" dominant-baseline="central">Vesicle detection &amp; segmentation</text>
  <text class="ts s3" x="420" y="247" text-anchor="middle" dominant-baseline="central">CNN identifies liposome boundaries</text>

  <!-- Arrow 3→4 left -->
  <line x1="300" y1="234" x2="260" y2="234" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <text class="step-num" x="150" y="196" text-anchor="middle">04</text>
  <rect class="b4" x="40" y="202" width="220" height="64" rx="8"/>
  <text class="th t4" x="150" y="227" text-anchor="middle" dominant-baseline="central">Morphology quantification</text>
  <text class="ts s4" x="150" y="247" text-anchor="middle" dominant-baseline="central">Size, lamellarity, bilayer thickness</text>

  <!-- Arrow 4→5 down -->
  <line x1="150" y1="266" x2="150" y2="326" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <text class="step-num" x="150" y="340" text-anchor="middle">05</text>
  <rect class="b5" x="40" y="346" width="220" height="64" rx="8"/>
  <text class="th t5" x="150" y="371" text-anchor="middle" dominant-baseline="central">Quality control report</text>
  <text class="ts s5" x="150" y="391" text-anchor="middle" dominant-baseline="central">Pass/fail against pharmaceutical spec</text>

  <!-- Side annotation: what gets measured -->
  <rect class="dashed" x="310" y="330" width="320" height="80" rx="8"/>
  <text class="ts" x="330" y="354">Measurements output per batch:</text>
  <text class="ts s3" x="330" y="374">— Mean vesicle diameter (nm)</text>
  <text class="ts s4" x="330" y="394">— Polydispersity index (PDI)</text>
  <text class="ts s5" x="330" y="414">— Encapsulation efficiency (%)</text>

  <!-- Legend -->
  <rect x="40" y="446" width="600" height="68" rx="8" class="dashed"/>
  <text class="ts" x="340" y="468" text-anchor="middle">Output: automated QC report replacing manual TEM analysis for liposomal drug batches</text>
  <text class="ts" x="340" y="488" text-anchor="middle">AI segmentation eliminates inter-analyst variability in vesicle boundary tracing</text>
  <text class="ts" x="340" y="508" text-anchor="middle">Cryo-TEM preserves native liposome structure — no chemical fixation artefacts</text>
</svg>
