<svg width="1100" height="820" viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <rect width="1100" height="820" fill="#0e1118" rx="14"/>
  <rect x="0" y="0" width="1100" height="68" fill="#13181f" rx="14"/>
  <rect x="0" y="54" width="1100" height="14" fill="#13181f"/>
  <rect x="32" y="22" width="4" height="28" rx="2" fill="#3b82f6"/>
  <text x="46" y="33" font-size="17" font-weight="700" fill="#f1f5f9">Quantitative Quality Control of Liposomal Drug Formulations</text>
  <text x="46" y="53" font-size="11" fill="#475569" letter-spacing="0.5">AI-Driven Cryo-TEM Analysis Pipeline for Pharmaceutical Batch Validation</text>

  <!-- PHASE I -->
  <rect x="28" y="86" width="194" height="310" rx="10" fill="#0f1e30" stroke="#2563eb" stroke-width="1.2"/>
  <rect x="28" y="86" width="194" height="42" rx="10" fill="#1d4ed8"/>
  <rect x="28" y="116" width="194" height="12" fill="#1d4ed8"/>
  <text x="125" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#bfdbfe" letter-spacing="2">PHASE I</text>
  <text x="125" y="118" text-anchor="middle" font-size="9" fill="#93c5fd" letter-spacing="1">THE TRUTH</text>
  <text x="125" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#dbeafe">Gold Annotation</text>
  <line x1="44" y1="158" x2="206" y2="158" stroke="#1e3a5f" stroke-width="0.8"/>
  <text x="44" y="176" font-size="10" font-weight="600" fill="#93c5fd">Tool</text>
  <text x="44" y="191" font-size="10" fill="#94a3b8">Streamlit annotation app</text>
  <text x="44" y="208" font-size="10" font-weight="600" fill="#93c5fd">What happens</text>
  <text x="44" y="223" font-size="10" fill="#94a3b8">A pharmacologist manually</text>
  <text x="44" y="237" font-size="10" fill="#94a3b8">traces the boundaries of each</text>
  <text x="44" y="251" font-size="10" fill="#94a3b8">liposome in 50 to 100 cryo-TEM</text>
  <text x="44" y="265" font-size="10" fill="#94a3b8">images. Size, shape, and layer</text>
  <text x="44" y="279" font-size="10" fill="#94a3b8">count are all annotated by hand.</text>
  <text x="44" y="296" font-size="10" font-weight="600" fill="#93c5fd">Why it matters</text>
  <text x="44" y="311" font-size="10" fill="#94a3b8">This is the only data in the</text>
  <text x="44" y="325" font-size="10" fill="#94a3b8">pipeline that is 100% human</text>
  <text x="44" y="339" font-size="10" fill="#94a3b8">verified. All accuracy tests</text>
  <text x="44" y="353" font-size="10" fill="#94a3b8">go back to this set.</text>
  <rect x="44" y="362" width="140" height="28" rx="6" fill="#172554"/>
  <text x="114" y="374" text-anchor="middle" font-size="9" fill="#93c5fd" font-weight="600">Output</text>
  <text x="114" y="386" text-anchor="middle" font-size="9" fill="#bfdbfe">Ground truth "answer key"</text>

  <line x1="222" y1="242" x2="250" y2="242" stroke="#1e293b" stroke-width="1.8"/>
  <polygon points="248,237 258,242 248,247" fill="#1e293b"/>

  <!-- PHASE II -->
  <rect x="258" y="86" width="194" height="310" rx="10" fill="#180f38" stroke="#7c3aed" stroke-width="1.2"/>
  <rect x="258" y="86" width="194" height="42" rx="10" fill="#6d28d9"/>
  <rect x="258" y="116" width="194" height="12" fill="#6d28d9"/>
  <text x="355" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#ddd6fe" letter-spacing="2">PHASE II</text>
  <text x="355" y="118" text-anchor="middle" font-size="9" fill="#c4b5fd" letter-spacing="1">THE TUNING</text>
  <text x="355" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#ede9fe">Calibration</text>
  <line x1="274" y1="158" x2="436" y2="158" stroke="#2e1065" stroke-width="0.8"/>
  <text x="274" y="176" font-size="10" font-weight="600" fill="#c4b5fd">Tool</text>
  <text x="274" y="191" font-size="10" fill="#94a3b8">Streamlit calibration sandbox</text>
  <text x="274" y="208" font-size="10" font-weight="600" fill="#c4b5fd">What happens</text>
  <text x="274" y="223" font-size="10" fill="#94a3b8">You write and test prompts that</text>
  <text x="274" y="237" font-size="10" fill="#94a3b8">tell Gemini how to identify and</text>
  <text x="274" y="251" font-size="10" fill="#94a3b8">segment liposomes. You run each</text>
  <text x="274" y="265" font-size="10" fill="#94a3b8">version against the Gold Set and</text>
  <text x="274" y="279" font-size="10" fill="#94a3b8">keep improving until Gemini hits</text>
  <text x="274" y="293" font-size="10" fill="#94a3b8">95% agreement with the expert.</text>
  <text x="274" y="310" font-size="10" font-weight="600" fill="#c4b5fd">Why it matters</text>
  <text x="274" y="325" font-size="10" fill="#94a3b8">You do not move to Phase III</text>
  <text x="274" y="339" font-size="10" fill="#94a3b8">until this gate is passed. A bad</text>
  <text x="274" y="353" font-size="10" fill="#94a3b8">prompt will mislabel everything.</text>
  <rect x="274" y="362" width="158" height="28" rx="6" fill="#3b0764" stroke="#7c3aed" stroke-width="1"/>
  <text x="353" y="374" text-anchor="middle" font-size="9" fill="#ddd6fe" font-weight="700">GATE 1</text>
  <text x="353" y="386" text-anchor="middle" font-size="9" fill="#c4b5fd">Gemini must reach 95% accuracy</text>

  <line x1="452" y1="242" x2="480" y2="242" stroke="#1e293b" stroke-width="1.8"/>
  <polygon points="478,237 488,242 478,247" fill="#1e293b"/>

  <!-- PHASE III -->
  <rect x="488" y="86" width="194" height="310" rx="10" fill="#1c1500" stroke="#d97706" stroke-width="1.2"/>
  <rect x="488" y="86" width="194" height="42" rx="10" fill="#b45309"/>
  <rect x="488" y="116" width="194" height="12" fill="#b45309"/>
  <text x="585" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#fef3c7" letter-spacing="2">PHASE III</text>
  <text x="585" y="118" text-anchor="middle" font-size="9" fill="#fcd34d" letter-spacing="1">THE SCALE</text>
  <text x="585" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#fef9c3">Bulk Silver Labelling</text>
  <line x1="504" y1="158" x2="666" y2="158" stroke="#3d2e00" stroke-width="0.8"/>
  <text x="504" y="176" font-size="10" font-weight="600" fill="#fcd34d">Tool</text>
  <text x="504" y="191" font-size="10" fill="#94a3b8">Python batch processing script</text>
  <text x="504" y="208" font-size="10" font-weight="600" fill="#fcd34d">What happens</text>
  <text x="504" y="223" font-size="10" fill="#94a3b8">The calibrated prompt runs over</text>
  <text x="504" y="237" font-size="10" fill="#94a3b8">2,000 or more cryo-TEM images</text>
  <text x="504" y="251" font-size="10" fill="#94a3b8">automatically. Gemini segments</text>
  <text x="504" y="265" font-size="10" fill="#94a3b8">each vesicle and logs size, PDI,</text>
  <text x="504" y="279" font-size="10" fill="#94a3b8">and bilayer count per image.</text>
  <text x="504" y="296" font-size="10" font-weight="600" fill="#fcd34d">Why it matters</text>
  <text x="504" y="311" font-size="10" fill="#94a3b8">You need thousands of examples</text>
  <text x="504" y="325" font-size="10" fill="#94a3b8">to train a reliable student model.</text>
  <text x="504" y="339" font-size="10" fill="#94a3b8">This step creates that data</text>
  <text x="504" y="353" font-size="10" fill="#94a3b8">without any manual effort.</text>
  <rect x="504" y="362" width="140" height="28" rx="6" fill="#3d2e00"/>
  <text x="574" y="374" text-anchor="middle" font-size="9" fill="#fcd34d" font-weight="600">Output</text>
  <text x="574" y="386" text-anchor="middle" font-size="9" fill="#fef3c7">Training set for local CNN model</text>

  <line x1="682" y1="242" x2="710" y2="242" stroke="#1e293b" stroke-width="1.8"/>
  <polygon points="708,237 718,242 708,247" fill="#1e293b"/>

  <!-- PHASE IV -->
  <rect x="718" y="86" width="194" height="310" rx="10" fill="#071f16" stroke="#059669" stroke-width="1.2"/>
  <rect x="718" y="86" width="194" height="42" rx="10" fill="#047857"/>
  <rect x="718" y="116" width="194" height="12" fill="#047857"/>
  <text x="815" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#d1fae5" letter-spacing="2">PHASE IV</text>
  <text x="815" y="118" text-anchor="middle" font-size="9" fill="#6ee7b7" letter-spacing="1">THE TRAINING</text>
  <text x="815" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#ecfdf5">Distillation</text>
  <line x1="734" y1="158" x2="896" y2="158" stroke="#052e16" stroke-width="0.8"/>
  <text x="734" y="176" font-size="10" font-weight="600" fill="#6ee7b7">Tool</text>
  <text x="734" y="191" font-size="10" fill="#94a3b8">PyTorch and HuggingFace</text>
  <text x="734" y="208" font-size="10" font-weight="600" fill="#6ee7b7">What happens</text>
  <text x="734" y="223" font-size="10" fill="#94a3b8">A local U-Net or CNN model is</text>
  <text x="734" y="237" font-size="10" fill="#94a3b8">trained on the silver labels from</text>
  <text x="734" y="251" font-size="10" fill="#94a3b8">Phase III. It learns to segment</text>
  <text x="734" y="265" font-size="10" fill="#94a3b8">liposomes and measure their</text>
  <text x="734" y="279" font-size="10" fill="#94a3b8">morphology on its own, without</text>
  <text x="734" y="293" font-size="10" fill="#94a3b8">calling any external API.</text>
  <text x="734" y="310" font-size="10" font-weight="600" fill="#6ee7b7">Why it matters</text>
  <text x="734" y="325" font-size="10" fill="#94a3b8">The local model is fast, free to</text>
  <text x="734" y="339" font-size="10" fill="#94a3b8">run, and produces consistent</text>
  <text x="734" y="353" font-size="10" fill="#94a3b8">results across every batch.</text>
  <rect x="734" y="362" width="140" height="28" rx="6" fill="#052e16"/>
  <text x="804" y="374" text-anchor="middle" font-size="9" fill="#6ee7b7" font-weight="600">Output</text>
  <text x="804" y="386" text-anchor="middle" font-size="9" fill="#d1fae5">Trained local segmentation model</text>

  <!-- down arrow to Phase V -->
  <line x1="815" y1="396" x2="815" y2="432" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="815" y1="432" x2="550" y2="432" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="550" y1="432" x2="550" y2="455" stroke="#1e293b" stroke-width="1.8"/>
  <polygon points="545,453 550,463 555,453" fill="#1e293b"/>

  <!-- PHASE V -->
  <rect x="28" y="463" width="1044" height="320" rx="10" fill="#180a0a" stroke="#b91c1c" stroke-width="1.2"/>
  <rect x="28" y="463" width="1044" height="44" rx="10" fill="#991b1b"/>
  <rect x="28" y="495" width="1044" height="12" fill="#991b1b"/>
  <text x="550" y="482" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" letter-spacing="2">PHASE V</text>
  <text x="550" y="496" text-anchor="middle" font-size="9" fill="#fca5a5" letter-spacing="1">THE EXAM  --  STUDENT QC AND DEPLOYMENT</text>

  <text x="50" y="528" font-size="10" fill="#cbd5e1">The student model is trained but that does not mean it is ready for use on real pharmaceutical batches. This phase validates it against images</text>
  <text x="50" y="543" font-size="10" fill="#cbd5e1">it has never seen. It needs to prove it learned how to measure liposome morphology and not just memorize the training images.</text>

  <!-- Panel 1 -->
  <rect x="42" y="556" width="308" height="210" rx="8" fill="#1f1010"/>
  <text x="58" y="575" font-size="10" font-weight="700" fill="#fca5a5">How the test works</text>
  <line x1="58" y1="581" x2="334" y2="581" stroke="#3f1515" stroke-width="0.8"/>
  <text x="58" y="597" font-size="10" fill="#94a3b8">20 images from Phase I were kept</text>
  <text x="58" y="612" font-size="10" fill="#94a3b8">separate and never used during</text>
  <text x="58" y="627" font-size="10" fill="#94a3b8">training. The student runs on these</text>
  <text x="58" y="642" font-size="10" fill="#94a3b8">and its output is compared against</text>
  <text x="58" y="657" font-size="10" fill="#94a3b8">the Gemini teacher label directly.</text>
  <text x="58" y="675" font-size="10" fill="#94a3b8">Example: teacher counted 15 vesicles,</text>
  <text x="58" y="690" font-size="10" fill="#94a3b8">student counted 14. That is 93%</text>
  <text x="58" y="705" font-size="10" fill="#94a3b8">fidelity, which is a passing score.</text>
  <text x="58" y="723" font-size="10" fill="#94a3b8">The full test set must average an</text>
  <text x="58" y="738" font-size="10" fill="#94a3b8">F1 score above 0.90 to proceed.</text>

  <!-- Panel 2 -->
  <rect x="368" y="556" width="340" height="210" rx="8" fill="#1f1010"/>
  <text x="384" y="575" font-size="10" font-weight="700" fill="#fca5a5">What can go wrong</text>
  <line x1="384" y1="581" x2="692" y2="581" stroke="#3f1515" stroke-width="0.8"/>
  <rect x="384" y="588" width="308" height="82" rx="5" fill="#2a1010"/>
  <text x="398" y="604" font-size="10" font-weight="600" fill="#f87171">Failure A: Catastrophic Forgetting</text>
  <text x="398" y="620" font-size="10" fill="#94a3b8">The model works on standard images</text>
  <text x="398" y="635" font-size="10" fill="#94a3b8">but fails on unusual morphologies like</text>
  <text x="398" y="650" font-size="10" fill="#94a3b8">multilamellar vesicles. Fix: add those</text>
  <text x="398" y="665" font-size="10" fill="#94a3b8">cases back to Phase III and retrain.</text>
  <rect x="384" y="678" width="308" height="82" rx="5" fill="#2a1010"/>
  <text x="398" y="694" font-size="10" font-weight="600" fill="#f87171">Failure B: Hallucination</text>
  <text x="398" y="710" font-size="10" fill="#94a3b8">The model detects vesicle boundaries</text>
  <text x="398" y="725" font-size="10" fill="#94a3b8">in background noise or artifacts.</text>
  <text x="398" y="740" font-size="10" fill="#94a3b8">Fix: raise the confidence cutoff so</text>
  <text x="398" y="755" font-size="10" fill="#94a3b8">only detections above 80% are counted.</text>

  <!-- Panel 3 -->
  <rect x="726" y="556" width="330" height="210" rx="8" fill="#1f1010"/>
  <text x="742" y="575" font-size="10" font-weight="700" fill="#fca5a5">Gate 2 and deployment</text>
  <line x1="742" y1="581" x2="1040" y2="581" stroke="#3f1515" stroke-width="0.8"/>
  <rect x="742" y="588" width="298" height="36" rx="6" fill="#3b0000" stroke="#b91c1c" stroke-width="1"/>
  <text x="891" y="602" text-anchor="middle" font-size="10" font-weight="700" fill="#fca5a5">GATE 2</text>
  <text x="891" y="617" text-anchor="middle" font-size="9" fill="#fca5a5">F1 score above 0.90 on held-out set</text>
  <text x="742" y="644" font-size="10" fill="#94a3b8">A passing model gets packaged as</text>
  <text x="742" y="659" font-size="10" fill="#94a3b8">a notebook the QC team can run</text>
  <text x="742" y="674" font-size="10" fill="#94a3b8">on any new batch. It measures</text>
  <text x="742" y="689" font-size="10" fill="#94a3b8">diameter, PDI, and encapsulation</text>
  <text x="742" y="704" font-size="10" fill="#94a3b8">efficiency automatically per sample.</text>
  <rect x="742" y="716" width="298" height="34" rx="6" fill="#052e16"/>
  <text x="891" y="730" text-anchor="middle" font-size="10" fill="#34d399" font-weight="700">Deploys as</text>
  <text x="891" y="745" text-anchor="middle" font-size="10" fill="#86efac">quality_control_report.ipynb</text>

  <rect x="42" y="775" width="1030" height="2" rx="1" fill="#3f1515"/>
  <text x="550" y="793" text-anchor="middle" font-size="10" fill="#f87171" font-weight="600">Retrain loop: if Gate 2 fails, take the failing images back to Phase III, add them to the training set, and run Phase IV again</text>

  <rect x="28" y="800" width="510" height="14" rx="4" fill="#172554"/>
  <text x="283" y="810" text-anchor="middle" font-size="9" fill="#93c5fd">Gate 1 (Phase II): Gemini must match pharmacologist at 95% accuracy or higher</text>
  <rect x="562" y="800" width="510" height="14" rx="4" fill="#3b0000"/>
  <text x="817" y="810" text-anchor="middle" font-size="9" fill="#fca5a5">Gate 2 (Phase V): Student model must stay within 5% of teacher performance, F1 above 0.90</text>

</svg>
